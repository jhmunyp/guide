<html lang="ko">
<head>
  <meta charset="utf-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#1a1f2e; --gold:#b8965a; --gold2:#d4af7a; --line:#e8e4de;
      /* Spotlight (iPhone tutorial 느낌) */
      --spot-dim:.34; --spot-radius:18px;
      --spot-border:rgba(255,214,90,.95);
      --spot-glow:rgba(255,196,40,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:"Noto Sans KR",system-ui,sans-serif;background:#fff;color:#1e1e1e}

    /* ===== Landing ===== */
    #landing{
      min-height:100vh;background:var(--navy);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:50px 24px 60px;
    }
    .land-logo{height:36px;filter:brightness(0) invert(1);margin-bottom:36px}
    .land-line{width:48px;height:2px;background:var(--gold);margin:0 auto 28px}
    .land-title{font-family:"Noto Serif KR",serif;font-size:28px;font-weight:700;color:#fff;text-align:center;line-height:1.5;margin-bottom:10px}
    .land-sub{font-size:15px;color:var(--gold2);text-align:center;line-height:1.6;margin-bottom:44px}
    .land-q{font-size:13px;color:#7788aa;letter-spacing:.1em;margin-bottom:18px;text-align:center}

    .choice-grid{width:100%;max-width:380px;display:flex;flex-direction:column;gap:13px}
    .choice-btn{
      width:100%;display:flex;gap:15px;align-items:center;
      background:#ffffff0d;border:1.5px solid #ffffff18;border-radius:16px;
      padding:18px 20px;cursor:pointer;transition:.2s;text-align:left;
    }
    .choice-btn:active{background:var(--gold);border-color:var(--gold);transform:scale(.98)}
    .choice-icon{width:52px;height:52px;border-radius:13px;background:#ffffff12;display:flex;align-items:center;justify-content:center;font-size:26px;flex:0 0 auto}
    .choice-name{color:#fff;font-weight:800;font-size:19px;margin-bottom:3px}
    .choice-desc{color:#aabbd0;font-size:13px;line-height:1.5}
    .choice-arrow{margin-left:auto;color:#445577;font-size:20px}

    /* ===== Manual ===== */
    #manual{display:none;min-height:100vh;background:#fff}
    .top-header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .top-row{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
    .back-btn{
      width:36px;height:36px;border-radius:999px;border:1.5px solid var(--line);background:none;
      color:var(--navy);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    }
    .header{flex:1;display:flex;align-items:center;gap:8px}
    .header img{height:22px}
    .header span{font-weight:800;font-size:15px;color:var(--navy)}

    .tab-bar{display:flex;border-top:1px solid #f0ece6}
    .tab-btn{
      flex:1;border:none;background:none;cursor:pointer;
      padding:11px 4px;font-weight:900;font-size:13px;color:#999;
      border-bottom:3px solid transparent;transition:.18s;
      display:flex;flex-direction:column;align-items:center;gap:3px;
      font-family:"Noto Sans KR",sans-serif;
    }
    .tab-btn .t{font-size:18px}
    .tab-btn.active{color:var(--navy);border-bottom-color:var(--gold)}

    .notice{
      margin:16px 16px 0;padding:12px 14px;border-left:4px solid var(--gold);
      background:#fffbf4;border-radius:0 8px 8px 0;
    }
    .notice p{font-size:15px;line-height:1.7;color:#5a4220;font-weight:600}

    .wrap{padding:18px 16px 20px}
    .flow-title{
      font-family:"Noto Serif KR",serif;
      font-size:16px;font-weight:800;color:var(--navy);
      border-bottom:2px solid var(--gold);
      padding-bottom:8px;margin-bottom:16px;
    }

    .card{
      background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
      box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:14px;
      opacity:0;transform:translateY(16px);transition:opacity .45s ease,transform .45s ease;
    }
    .card.visible{opacity:1;transform:translateY(0)}
    .head{display:flex;gap:12px;align-items:center;padding:14px 15px 11px;border-bottom:1px solid #f5f2ee}
    .num{width:38px;height:38px;border-radius:999px;background:var(--navy);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center}
    .title{font-size:17px;font-weight:900;color:var(--navy);line-height:1.35}
    .sub{margin-top:2px;font-size:13px;color:#777;line-height:1.5}

    /* ===== Screenshot 영역: 이미지 밖은 흰색, spotlight는 이미지 크기만 ===== */
    .shot-area{background:#fff;padding:8px 0;text-align:center;overflow:hidden;position:relative}
    .shot-box{display:inline-block;position:relative} /* ✅ overlay 기준이 이미지 크기로 줄어듦 */
    .shot-mobile{display:block;max-height:440px;max-width:100%;width:auto;margin:0 auto}
    .shot-full{display:block;width:100%;max-height:400px;object-fit:cover;object-position:top}

    .arrow{margin:-2px 0 2px;text-align:center;font-size:22px;color:var(--gold)}

    .tip{padding:12px 14px;background:#f2f8ff;border-top:1px solid #ddeeff}
    .tip .lbl{font-size:11px;font-weight:900;color:#1a6fb8;margin-bottom:2px}
    .tip p{font-size:14px;line-height:1.75;color:#1a4a7a}
    .tip strong{color:#c05000}

    .complete{
      background:linear-gradient(135deg,#1a1f2e,#2d3a5e);
      border-radius:14px;padding:24px;text-align:center;margin:10px 0 16px;
      color:#fff;
    }
    .complete .emo{font-size:34px;margin-bottom:8px}
    .complete .t{font-family:"Noto Serif KR",serif;font-size:20px;font-weight:800;margin-bottom:6px}
    .complete .d{font-size:15px;color:var(--gold2);line-height:1.7}

    .help{
      background:var(--navy);margin:4px 16px 26px;border-radius:14px;padding:22px 18px;text-align:center
    }
    .help h3{font-family:"Noto Serif KR",serif;font-size:19px;color:#fff;margin-bottom:5px}
    .help p{font-size:15px;color:var(--gold2);margin-bottom:14px;line-height:1.6}
    .help a{
      display:inline-flex;gap:8px;align-items:center;
      background:var(--gold);color:#fff;text-decoration:none;
      font-size:20px;font-weight:900;padding:12px 26px;border-radius:999px;
    }
    .footer{border-top:1px solid var(--line);text-align:center;padding:14px;font-size:12px;color:#bbb}

    /* ===== Spotlight (iPhone tutorial style) ===== */
    .spot-overlay{
      position:absolute;inset:0;z-index:8;pointer-events:none;
      background:rgba(10,10,20,var(--spot-dim));
      backdrop-filter:blur(1.2px);
      -webkit-backdrop-filter:blur(1.2px);
    }
    .spot-hole{
      position:absolute;z-index:9;pointer-events:none;
      border-radius:var(--spot-radius);
      will-change:transform,box-shadow;
      animation:spotPulse 1.55s ease-in-out infinite;
    }
    @keyframes spotPulse{
  0%,100%{
    transform:scale(1);
    box-shadow:
      0 0 0 2px var(--spot-border),
      0 10px 28px 10px var(--spot-glow);
  }
  50%{
    transform:scale(1.015);
    box-shadow:
      0 0 0 3px var(--spot-border),
      0 16px 40px 14px rgba(255,208,70,.55);
  }
}
    .spot-callout{
      position:absolute;z-index:20;pointer-events:none;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }
    .spot-bubble{
      background:rgba(255,255,255,.92);
      color:var(--navy);font-size:14px;font-weight:900;
      padding:9px 14px;border-radius:999px;white-space:nowrap;
      border:1px solid rgba(255,255,255,.55);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .spot-finger{font-size:26px;transform-origin:50% 100%;animation:fingerFloat 1.4s ease-in-out infinite}
    @keyframes fingerFloat{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(6px) rotate(-10deg)}}
    .spot-line{width:2px;height:22px;background:rgba(255,255,255,.75);border-radius:2px;position:relative}
    .spot-line:after{
      content:"";position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
      border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid rgba(255,255,255,.75)
    }
  </style>
</head>

      web: {

        complete: { title:'비밀번호 변경 완료!', desc:'새 비밀번호로 로그인하실 수 있습니다 😊' }

    /* =============================
       2) 렌더 + Spotlight + 애니메이션
    ============================= */
    const $ = (s, p=document)=>p.querySelector(s);
    const $$ = (s, p=document)=>Array.from(p.querySelectorAll(s));

    const landing = $("#landing");
    const manual  = $("#manual");
    const flowTitle = $("#flowTitle");
    const flowRoot  = $("#flowRoot");

    let currentTab = "app";
    let obs;

    function escHtml(s){ return (s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

    function renderFlow(key){
      currentTab = key;
      const data = FLOWS[key];

      flowTitle.innerHTML = data.title;
      flowRoot.innerHTML = "";

      data.steps.forEach((st, idx)=>{
        flowRoot.appendChild(stepCard(idx+1, st));
        if (idx !== data.steps.length-1) flowRoot.appendChild(arrowEl());
      });

      flowRoot.appendChild(completeEl(data.complete));
      animateCards();
      buildSpotlights();
      setActiveTab(key);
      window.scrollTo(0,0);
    }

    function stepCard(n, st){
      const card = document.createElement("div");
      card.className = "card";

      const sub = st.sub ? `<div class="sub">${st.sub}</div>` : "";
      card.innerHTML = `
        <div class="head">
          <div class="num">${n}</div>
          <div>
            <div class="title">${st.t}</div>
            ${sub}
          </div>
        </div>
        <div class="shot-area">
          <div class="shot-box ${st.full ? "" : ""}">
            <img class="${st.full ? "shot-full" : "shot-mobile"}" src="${st.img}" alt="${escHtml(st.alt||"")}" ${st.full && st.img==="web_10.jpg" ? 'style="max-height:260px"' : ""}>
            <span data-hl
              data-top="${st.hl.top}"
              ${st.hl.left!=null ? `data-left="${st.hl.left}"` : ""}
              ${st.hl.right!=null ? `data-right="${st.hl.right}"` : ""}
              data-width="${st.hl.w}"
              data-height="${st.hl.h}"
              data-label="${escHtml(st.hl.label||"")}"
              ${st.hl.pos ? `data-pos="${st.hl.pos}"` : ""}></span>
          </div>
        </div>
      `;

      if (st.tip){
        const tip = document.createElement("div");
        tip.className = "tip";
        tip.innerHTML = `<div class="lbl">${st.tip.lbl}</div><p>${st.tip.html}</p>`;
        card.appendChild(tip);
      }
      return card;
    }

    function arrowEl(){
      const d = document.createElement("div");
      d.className = "arrow";
      d.textContent = "↓";
      return d;
    }

    function completeEl(c){
      const d = document.createElement("div");
      d.className = "complete";
      d.innerHTML = `
        <div class="emo">🎉</div>
        <div class="t">${escHtml(c.title)}</div>
        <div class="d">${escHtml(c.desc)}</div>
      `;
      return d;
    }

    function setActiveTab(key){
      $$(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===key));
    }

    function animateCards(){
      if (obs) obs.disconnect();
      obs = new IntersectionObserver((entries)=>{
        entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("visible"); });
      }, { threshold:0.07 });

      $$(".card").forEach(c=>{
        c.classList.remove("visible");
        obs.observe(c);
      });
    }

    function buildSpotlights(){
      $$(".shot-box").forEach(box=>{
        // cleanup
        $$(".spot-overlay,.spot-hole,.spot-callout", box).forEach(el=>el.remove());

        const hls = $$("[data-hl]", box);
        if (!hls.length) return;

        const overlay = document.createElement("div");
        overlay.className = "spot-overlay";
        box.appendChild(overlay);

        hls.forEach(el=>{
          const top = parseFloat(el.dataset.top);
          const left = el.dataset.left !== undefined ? parseFloat(el.dataset.left) : null;
          const right = el.dataset.right !== undefined ? parseFloat(el.dataset.right) : null;
          const w = parseFloat(el.dataset.width);
          const h = parseFloat(el.dataset.height);
          const label = el.dataset.label || "";
          const pos = el.dataset.pos || "below";

          // hole
          const hole = document.createElement("div");
          hole.className = "spot-hole";
          let css = `top:${top}%;width:${w}%;height:${h}%;`;
          if (right !== null) css += `right:${right}%;left:auto;`;
          else css += `left:${left}%;`;
          hole.style.cssText = css;
          box.appendChild(hole);

          // callout
          const callout = document.createElement("div");
          callout.className = "spot-callout";

          // top position
          const cTop = (pos==="above") ? (top - 18) : (top + h + 2);

          // left position (클램프: 화면 밖으로 튀지 않게)
          let rawLeft = (right !== null) ? (100 - right - w/2) : (left + w/2);
          rawLeft = Math.min(Math.max(rawLeft, 12), 88);

          callout.style.cssText = `top:${cTop}%;left:${rawLeft}%;transform:translateX(-50%);`;

          if (pos==="above"){
            callout.innerHTML = `
              <div class="spot-bubble">${escHtml(label)}</div>
              <div class="spot-line" style="transform:scaleY(-1)"></div>
              <div class="spot-finger">👉</div>`;
          } else {
            callout.innerHTML = `
              <div class="spot-finger">👉</div>
              <div class="spot-line"></div>
              <div class="spot-bubble">${escHtml(label)}</div>`;
          }
          box.appendChild(callout);
        });
      });
    }

    /* =============================
       3) UI 이벤트
    ============================= */
    function openManual(tab){
      landing.style.display = "none";
      manual.style.display = "block";
      renderFlow(tab);
      setTimeout(()=>buildSpotlights(), 60);
    }
    function goBack(){
      manual.style.display = "none";
      landing.style.display = "flex";
      window.scrollTo(0,0);
    }

    $$(".choice-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>openManual(btn.dataset.go));
    });

    $("#btnBack").addEventListener("click", goBack);

    $$(".tab-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>renderFlow(btn.dataset.tab));
    });

    window.addEventListener("load", ()=>{ /* 첫 로드에서는 랜딩 */ });
    window.addEventListener("resize", ()=>{ if (manual.style.display==="block") buildSpotlights(); });
  </script>
