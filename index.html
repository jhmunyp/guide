<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3" />
<title>비밀번호 찾기 안내 | 모나용평</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<section id="landing">
  <div class="land-title">비밀번호를<br>잊으셨나요?</div>
  <div class="land-sub">이용 환경에 맞는 절차를 선택해<br>비밀번호를 재설정할 수 있습니다</div>
  <div class="land-q">현재 어떤 환경에서 이용 중이신가요?</div>
  <div class="choice-grid">
    <button type="button" class="choice-btn" data-go="app">
      <div class="choice-icon"><img src="images/logo/mona_app.jpg" alt="모나 앱"></div>
      <div><div class="choice-name">모바일 앱</div><div class="choice-desc">스마트폰에 앱 설치</div></div>
      <div class="choice-arrow">›</div>
    </button>
    <button type="button" class="choice-btn" data-go="mweb">
      <div class="choice-icon"><span>M/W</span></div>
      <div><div class="choice-name">모바일 웹</div><div class="choice-desc">스마트폰 브라우저로 접속</div></div>
      <div class="choice-arrow">›</div>
    </button>
    <button type="button" class="choice-btn" data-go="web">
      <div class="choice-icon"><span>PC</span></div>
      <div><div class="choice-name">홈페이지 (PC)</div><div class="choice-desc">컴퓨터로 yongpyong.co.kr</div></div>
      <div class="choice-arrow">›</div>
    </button>
  </div>
</section>
<section id="manual">
  <header class="top">
    <div class="top-row">
      <button type="button" class="back" id="back">←</button>
      <div class="hdr">
        <img src="images/logo/mona_app.jpg" alt="모나용평" onerror="this.style.display='none'">
        <span>비밀번호 찾기 안내</span>
      </div>
    </div>
    <nav class="tabs">
      <button type="button" class="tab on" data-tab="app"><span class="t"><img src="images/logo/mona_app.jpg" alt=""></span>모바일 앱</button>
      <button type="button" class="tab" data-tab="mweb"><span class="t">M/W</span>모바일 웹</button>
      <button type="button" class="tab" data-tab="web"><span class="t">PC</span>홈페이지(PC)</button>
    </nav>
  </header>
  <div class="notice"><p>표시된 영역을 순서대로 확인해 진행해 주세요.</p></div>
  <div class="wrap">
    <div id="flowTitle" class="flow-title"></div>
    <div id="flowRoot"></div>
    <div class="help">
      <h3>고객센터 안내</h3>
      <p>진행이 어려운 경우 고객센터로 문의해 주세요.</p>
      <a href="tel:033-330-8506">033-330-8506</a>
    </div>
    <div class="footer">© MONAYongPyong · 고객센터 033-330-8506</div>
  </div>
</section>
<script src="js/app.js"></script>
</body>
</html>
