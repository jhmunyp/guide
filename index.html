<!--
  개발용 파일 설명
  - 이 파일은 HL(하이라이트) 편집 기능이 포함된 개발용 HTML입니다.
  - 하단의 '배포 다운로드' 버튼을 누르면 HL 기능이 제거된 배포용 ZIP을 생성합니다.
  - 배포 ZIP 내부 구조:
      /index.html
      /css/style.css
      /js/app.js
      /images/...
  - 주의: 이미지까지 ZIP에 포함하려면 file:// 더블클릭 실행이 아니라 로컬 서버 환경에서 테스트하는 것이 안전합니다.
-->

<!-- 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
/* =========================================================
   1. 공통 변수
   ========================================================= */
:root{
  --ink:#111318;
  --navy:#121722;
  --navy-2:#1a2130;
  --gold:#a98a57;
  --gold-soft:#c7b08a;
  --line:#ded7cd;
  --line-soft:#ebe6df;
  --bg:#f5f4f1;
  --card:#ffffff;
  --muted:#6b7280;
  --dim:.56;
  --r:10px;
  --appH:100vh;
}

/* =========================================================
   2. 기본 리셋
   ========================================================= */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%}
body{
  font-family:"Noto Sans KR",system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  letter-spacing:-.01em;
  overflow-x:hidden;
}
button,input,textarea,select{font:inherit}
img{display:block;max-width:100%}

/* =========================================================
   3. 랜딩 화면
   ========================================================= */
#landing{
  min-height:var(--appH);
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),
    linear-gradient(135deg, #10141d 0%, #161d29 55%, #0f141c 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px 56px;
}
.land-title{
  font-family:"Noto Serif KR",serif;
  font-size:30px;font-weight:700;
  color:#fff;text-align:center;line-height:1.45;letter-spacing:-.02em;
  margin-bottom:12px;
}
.land-sub{
  font-size:14px;color:#c8c2ba;text-align:center;line-height:1.8;
  margin-bottom:36px;
}
.land-q{
  font-size:11px;color:#8f98a6;letter-spacing:.12em;margin-bottom:14px;
  text-align:center;text-transform:uppercase;
}
.choice-grid{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px}
.choice-btn{
  width:100%;display:flex;gap:14px;align-items:center;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:17px 18px;
  cursor:pointer;
  transition:background .2s,border-color .2s,transform .2s;
  text-align:left;
}
.choice-btn:hover{border-color:rgba(169,138,87,.45);background:rgba(255,255,255,.07)}
.choice-btn:active{transform:scale(.99)}
.choice-icon{
  width:50px;height:50px;border-radius:10px;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;padding:8px;
  border:1px solid rgba(255,255,255,.08);
  color:#f5f5f5;font-size:12px;font-weight:800;letter-spacing:.06em;
}
.choice-icon img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.choice-name{color:#fff;font-weight:800;font-size:18px;margin-bottom:2px}
.choice-desc{color:#9ca7b7;font-size:12px;line-height:1.5}
.choice-arrow{margin-left:auto;color:#7e8797;font-size:18px}

/* =========================================================
   4. 매뉴얼 화면
   ========================================================= */
#manual{display:none;min-height:var(--appH);background:var(--bg)}
.top{
  position:sticky;top:0;z-index:10;background:rgba(245,244,241,.92);
  border-bottom:1px solid rgba(222,215,205,.85);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.top-row{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.back{
  width:36px;height:36px;border-radius:999px;border:1px solid var(--line);
  background:#fff;color:var(--navy);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.hdr{flex:1;display:flex;align-items:center;gap:8px}
.hdr img{height:22px}
.hdr span{font-weight:800;font-size:14px;color:var(--navy);letter-spacing:-.01em}
.tabs{display:flex;border-top:1px solid #ece7e0;background:#fff}
.tab{
  flex:1;border:0;background:none;cursor:pointer;padding:11px 4px;
  font-weight:800;font-size:12px;color:#8c8f96;border-bottom:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.tab .t{
  width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:2px;color:var(--navy);font-size:11px;font-weight:800;letter-spacing:.06em;
}
.tab .t img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.tab.on{color:var(--navy);border-bottom-color:var(--gold)}

.notice{
  margin:16px 16px 0;padding:12px 14px;border-left:2px solid var(--gold);
  background:#fcfbf8;border-radius:0 10px 10px 0;
}
.notice p{font-size:14px;line-height:1.7;color:#4c4337;font-weight:700}

.wrap{padding:18px 16px 20px}
.flow-title{
  font-family:"Noto Serif KR",serif;font-size:16px;font-weight:700;color:var(--navy);
  border-bottom:1px solid var(--gold-soft);padding-bottom:9px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;line-height:1.2;
}
.flow-icon{width:22px;height:22px;object-fit:contain;display:block}

/* =========================================================
   5. 단계 카드
   ========================================================= */
.card{
  background:var(--card);border:1px solid var(--line-soft);border-radius:12px;overflow:hidden;
  margin-bottom:14px;opacity:0;transform:translateY(12px);transition:.3s;
}
.card.in{opacity:1;transform:none}
.head{
  display:flex;gap:12px;align-items:center;padding:14px 15px 12px;
  border-bottom:1px solid #f0ece6;background:#fff;
}
.num{
  width:34px;height:34px;border-radius:999px;background:var(--navy);color:#fff;
  font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.title{font-size:16px;font-weight:800;color:var(--navy);line-height:1.45;letter-spacing:-.01em}
.sub{margin-top:3px;font-size:12px;color:var(--muted);line-height:1.6}

.shot-area{
  background:linear-gradient(180deg,#161b25,#0f141d);
  padding:18px 0 20px;text-align:center;
}
.phone{
  position:relative;display:inline-block;padding:12px;border-radius:24px;
  background:linear-gradient(180deg,#0f141f,#070b12);
  box-shadow:0 14px 34px rgba(0,0,0,.26), inset 0 0 0 1px rgba(255,255,255,.06);
}
.screen{
  position:relative;z-index:2;border-radius:16px;overflow:hidden;background:#000;
  --ct:0%;--cr:0%;--cb:0%;--cl:0%;
}
.screen img{
  display:block;max-width:100%;width:auto;height:auto;max-height:440px;border-radius:16px;transform:translateZ(0);
}
.screen img.full{
  width:100%;max-width:760px;height:auto;max-height:none;object-fit:contain;object-position:top;
}
.img-blur{filter:brightness(.66) saturate(.92);transform:translateZ(0)}
.img-sharp{
  position:absolute;inset:0;width:100%;height:100%;filter:none;object-fit:inherit;object-position:inherit;
  clip-path: inset(var(--ct) var(--cr) var(--cb) var(--cl) round var(--r));
}

/* =========================================================
   6. 하이라이트 시각 요소
   ========================================================= */
.ring{
  position:absolute;z-index:6;pointer-events:none;border-radius:var(--r);
  border:1.5px solid rgba(210,181,127,.98);box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;
}
.callout{
  position:absolute;z-index:7;pointer-events:none;display:flex;align-items:center;justify-content:center;
}
.bub{
  background:rgba(18,23,34,.92);color:#fff;font-size:12px;font-weight:800;line-height:1;
  padding:8px 12px;border-radius:999px;white-space:nowrap;border:1px solid rgba(210,181,127,.35);
  letter-spacing:-.01em;
}

.arrow{margin:0 0 12px;text-align:center;font-size:14px;color:#8a7a63;letter-spacing:.08em}
.tip{padding:12px 14px;background:#fbfaf7;border-top:1px solid #ece7e0}
.tip .lbl{font-size:11px;font-weight:800;color:#6c5840;margin-bottom:4px;letter-spacing:.04em}
.tip p{font-size:13px;line-height:1.75;color:#4d5562}
.tip strong{color:#2d3440}

.complete{
  background:#fff;border:1px solid var(--line-soft);border-radius:12px;
  padding:22px 18px;text-align:center;margin:8px 0 16px;
}
.complete .t{font-family:"Noto Serif KR",serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.complete .d{font-size:14px;color:#616a77;line-height:1.7}

.help{
  background:var(--navy);margin:6px 16px 24px;border-radius:12px;padding:20px 18px;text-align:center;
}
.help h3{font-family:"Noto Serif KR",serif;font-size:18px;color:#fff;margin-bottom:6px}
.help p{font-size:14px;color:#c8c2ba;margin-bottom:14px;line-height:1.7}
.help a{
  display:inline-flex;align-items:center;justify-content:center;background:#fff;color:var(--navy);
  text-decoration:none;font-size:18px;font-weight:800;padding:11px 24px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
}
.footer{border-top:1px solid rgba(222,215,205,.8);text-align:center;padding:14px;font-size:11px;color:#8d95a1}

/* =========================================================
   7. 개발용 툴 UI
   - HL 편집 ON/OFF
   - 좌표 복사
   - 배포 ZIP 생성
   ========================================================= */
.dev-tools{
  position:fixed;left:14px;bottom:14px;z-index:9999;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:rgba(17,24,39,.94);color:#fff;padding:10px 12px;border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 16px 34px rgba(0,0,0,.28);
  font-size:12px;font-weight:800;max-width:min(92vw,920px);
}
.dev-tools button{
  border:0;cursor:pointer;border-radius:10px;padding:8px 10px;font-weight:800;
  background:rgba(255,255,255,.1);color:#fff;
}
.dev-tools button:active{transform:scale(.98)}
.dev-tools .on{background:#8b6f44}
.dev-tools .meta{opacity:.9;font-weight:700}
.dev-tools .primary{background:#8b6f44}

/* =========================================================
   8. 개발용 임시 하이라이트 박스
   - 편집 중인 영역을 점선 박스로 보여줌
   - 배포용에는 포함되지 않음
   ========================================================= */
.hl-rect{
  position:absolute;z-index:50;pointer-events:none;border:1.5px dashed rgba(210,181,127,.95);
  box-shadow:0 0 0 1px rgba(255,255,255,.08) inset;border-radius:var(--r);
}
</style>
</head>

const $ = (s,p=document)=>p.querySelector(s);
const $$ = (s,p=document)=>Array.from(p.querySelectorAll(s));
const landing = $('#landing');
const manual = $('#manual');
const flowTitle = $('#flowTitle');

let io = null;
let HL_EDIT = false;

let dragging = false;

/* =========================================================
   4. 모바일 viewport 대응 (하단 잘림 해결)
   ========================================================= */
function setAppHeight() {

  document.documentElement.style.setProperty('--appH', `${vh * 100}px`);
}

/* =========================================================
   5. 카드 렌더링 관련 함수
   ========================================================= */
function setTab(key){
  $$('.tab').forEach(btn=>btn.classList.toggle('on', btn.dataset.tab===key));
}

function arrowEl(){
  const el = document.createElement('div');
  el.className = 'arrow';
  el.textContent = '—';
  return el;
}

function completeEl(data){
  const el = document.createElement('div');
  el.className = 'complete';
  el.innerHTML = `<div class="t">${esc(data.title)}</div><div class="d">${esc(data.desc)}</div>`;
  return el;
}

function stepCard(stepNumber, step){
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="head">
      <div class="num">${stepNumber}</div>
      <div>
        <div class="title">${step.t}</div>
        ${step.sub ? `<div class="sub">${step.sub}</div>` : ''}
      </div>
    </div>
    <div class="shot-area">
      <div class="phone">
        <div class="screen">
          <img class="img-blur ${step.full ? 'full' : ''}" src="${step.img}" alt="${esc(step.alt)}">
          <img class="img-sharp ${step.full ? 'full' : ''}" src="${step.img}" alt="">
          <span data-hl
            data-top="${step.hl.top}"
            ${step.hl.left!=null ? `data-left="${step.hl.left}"` : ''}
            ${step.hl.right!=null ? `data-right="${step.hl.right}"` : ''}
            data-w="${step.hl.w}"
            data-h="${step.hl.h}"
            data-label="${esc(step.hl.label || '')}"
            ${step.hl.pos ? `data-pos="${step.hl.pos}"` : ''}></span>
        </div>
      </div>
    </div>`;

  if(step.tip){
    const tip = document.createElement('div');
    tip.className = 'tip';
    tip.innerHTML = `<div class="lbl">${step.tip.lbl}</div><p>${step.tip.html}</p>`;
    el.appendChild(tip);
  }

  return el;
}

/* =========================================================
   6. 카드 등장 애니메이션
   ========================================================= */
function animateCards(){
  if(io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) entry.target.classList.add('in');
    });
  }, { threshold:.07 });

  $$('.card').forEach(card => {
    card.classList.remove('in');
    io.observe(card);
  });
}

/* =========================================================
   7. 하이라이트 그리기
   ========================================================= */
function buildSpot(){
  $$('.screen').forEach(screen => {
    $$('.ring,.callout,.hl-rect', screen).forEach(el => el.remove());

    const hl = $('[data-hl]', screen);
    if(!hl) return;

    const top = +hl.dataset.top;
    const w = +hl.dataset.w;
    const h = +hl.dataset.h;
    const left0 = hl.dataset.left != null ? +hl.dataset.left : null;
    const right0 = hl.dataset.right != null ? +hl.dataset.right : null;
    const label = hl.dataset.label || '';
    const pos = hl.dataset.pos || 'below';
    const left = (right0 != null) ? (100 - right0 - w) : left0;

    const ct = top;
    const cl = left;
    const cb = 100 - (top + h);
    const cr = 100 - (left + w);

    screen.style.setProperty('--ct', ct + '%');
    screen.style.setProperty('--cr', cr + '%');
    screen.style.setProperty('--cb', cb + '%');
    screen.style.setProperty('--cl', cl + '%');

    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.cssText = `top:${top}%;left:${left}%;width:${w}%;height:${h}%;`;
    screen.appendChild(ring);

    const callout = document.createElement('div');
    callout.className = 'callout';
    const cTop = (pos === 'above') ? (top - 8) : (top + h + 3);
    let mid = left + (w / 2);
    mid = Math.min(Math.max(mid, 12), 88);
    callout.style.cssText = `top:${cTop}%;left:${mid}%;transform:translateX(-50%);`;
    callout.innerHTML = `<div class="bub">${esc(label)}</div>`;
    screen.appendChild(callout);

    if(HL_EDIT && hlTarget && hlTarget.screenEl === screen){
      drawTempRect(screen, hlTarget.st.hl);
    }
  });
}

/* =========================================================
   8. 이미지 로딩 대기
   ========================================================= */
async function waitImgs(root){
  const imgs = $$('img', root);
  await Promise.all(imgs.map(img => img.complete ? 0 : new Promise(resolve => {
    img.addEventListener('load', resolve, { once:true });
    img.addEventListener('error', resolve, { once:true });
  })));
}

/* =========================================================
   9. 화면 렌더링 메인 함수
   ========================================================= */
async function render(key){
  const data = FLOWS[key];
  setTab(key);
  flowTitle.innerHTML = data.title;
  flowRoot.innerHTML = '';
  hlTarget = null;

  data.steps.forEach((step, index) => {
    flowRoot.appendChild(stepCard(index + 1, step));
    if(index < data.steps.length - 1) flowRoot.appendChild(arrowEl());
  });

  if(data.complete) flowRoot.appendChild(completeEl(data.complete));

  window.scrollTo(0,0);
  animateCards();
  await waitImgs(flowRoot);
  buildSpot();
}

function openManual(key){
  landing.style.display = 'none';
  manual.style.display = 'block';
  render(key);
}

function backToLanding(){
  manual.style.display = 'none';
  landing.style.display = 'flex';
  window.scrollTo(0,0);
}

/* =========================================================
   10. HL 편집 관련 함수
   ========================================================= */
function getCurrentFlowKey(){
  const current = document.querySelector('.tab.on');
  return current ? current.dataset.tab : 'app';
}

function findStepIndexFromScreen(screenEl){
  const cards = Array.from(document.querySelectorAll('#flowRoot .card'));
  const card = screenEl.closest('.card');
  return cards.indexOf(card);
}

function selectTargetFromEvent(e){
  const screen = e.target.closest('.screen');
  if(!screen) return null;

  const key = getCurrentFlowKey();
  const idx = findStepIndexFromScreen(screen);
  if(idx < 0) return null;

  const st = FLOWS[key].steps[idx];
  return { key, idx, st, screenEl:screen };
}

function percentRectFromDrag(screenEl, a, b){
  const rect = screenEl.getBoundingClientRect();

  const x1 = Math.max(0, Math.min(a.x, b.x) - rect.left);
  const y1 = Math.max(0, Math.min(a.y, b.y) - rect.top);
  const x2 = Math.min(rect.width, Math.max(a.x, b.x) - rect.left);
  const y2 = Math.min(rect.height, Math.max(a.y, b.y) - rect.top);

  const left = (x1 / rect.width) * 100;
  const top = (y1 / rect.height) * 100;
  const w = ((x2 - x1) / rect.width) * 100;
  const h = ((y2 - y1) / rect.height) * 100;

  const round = value => Math.round(value * 10) / 10;
  return { top:round(top), left:round(left), w:round(w), h:round(h) };
}

function applyHlToStep(step, rect){
  step.hl.top = rect.top;
  step.hl.left = rect.left;
  delete step.hl.right;
  step.hl.w = rect.w;
  step.hl.h = rect.h;
}

function applyClipVarsToScreen(screenEl, hl){
  const top = +hl.top;
  const left = (hl.left != null ? +hl.left : (100 - (+hl.right) - (+hl.w)));
  const w = +hl.w;
  const h = +hl.h;

  screenEl.style.setProperty('--ct', top + '%');
  screenEl.style.setProperty('--cl', left + '%');
  screenEl.style.setProperty('--cb', (100 - (top + h)) + '%');
  screenEl.style.setProperty('--cr', (100 - (left + w)) + '%');
}

function drawTempRect(screenEl, hl){
  let box = screenEl.querySelector('.hl-rect');
  if(!box){
    box = document.createElement('div');
    box.className = 'hl-rect';
    screenEl.appendChild(box);
  }

  const left = (hl.left != null ? hl.left : (100 - hl.right - hl.w));
  box.style.cssText = `top:${hl.top}%;left:${left}%;width:${hl.w}%;height:${hl.h}%;`;
}

function refreshOne(screenEl){
  if(!hlTarget) return;
  applyClipVarsToScreen(screenEl, hlTarget.st.hl);
  drawTempRect(screenEl, hlTarget.st.hl);
}

function moveDrag(clientX, clientY){
  if(!dragging || !hlTarget) return;
  const rect = percentRectFromDrag(hlTarget.screenEl, dragStart, { x:clientX, y:clientY });
  applyHlToStep(hlTarget.st, rect);
  refreshOne(hlTarget.screenEl);
}

function endDrag(){
  if(!dragging) return;
  dragging = false;
  dragStart = null;
  buildSpot();
}

#landing{min-height:var(--appH);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),linear-gradient(135deg, #10141d 0%, #161d29 55%, #0f141c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 56px}
.land-title{font-family:"Noto Serif KR",serif;font-size:30px;font-weight:700;color:#fff;text-align:center;line-height:1.45;letter-spacing:-.02em;margin-bottom:12px}
.land-sub{font-size:14px;color:#c8c2ba;text-align:center;line-height:1.8;margin-bottom:36px}
.land-q{font-size:11px;color:#8f98a6;letter-spacing:.12em;margin-bottom:14px;text-align:center;text-transform:uppercase}
.choice-grid{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px}
.choice-btn{width:100%;display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:17px 18px;cursor:pointer;transition:background .2s,border-color .2s,transform .2s;text-align:left}
.choice-btn:hover{border-color:rgba(169,138,87,.45);background:rgba(255,255,255,.07)}.choice-btn:active{transform:scale(.99)}
.choice-icon{width:50px;height:50px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;padding:8px;border:1px solid rgba(255,255,255,.08);color:#f5f5f5;font-size:12px;font-weight:800;letter-spacing:.06em}
.choice-icon img{max-width:100%;max-height:100%;object-fit:contain;display:block}.choice-name{color:#fff;font-weight:800;font-size:18px;margin-bottom:2px}.choice-desc{color:#9ca7b7;font-size:12px;line-height:1.5}.choice-arrow{margin-left:auto;color:#7e8797;font-size:18px}
#manual{display:none;min-height:var(--appH);background:var(--bg)}
.top{position:sticky;top:0;z-index:10;background:rgba(245,244,241,.92);border-bottom:1px solid rgba(222,215,205,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.top-row{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.back{width:36px;height:36px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center}
.hdr{flex:1;display:flex;align-items:center;gap:8px}.hdr img{height:22px}.hdr span{font-weight:800;font-size:14px;color:var(--navy);letter-spacing:-.01em}
.tabs{display:flex;border-top:1px solid #ece7e0;background:#fff}
.tab{flex:1;border:0;background:none;cursor:pointer;padding:11px 4px;font-weight:800;font-size:12px;color:#8c8f96;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab .t{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:2px;color:var(--navy);font-size:11px;font-weight:800;letter-spacing:.06em}
.tab .t img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}.tab.on{color:var(--navy);border-bottom-color:var(--gold)}
.notice{margin:16px 16px 0;padding:12px 14px;border-left:2px solid var(--gold);background:#fcfbf8;border-radius:0 10px 10px 0}.notice p{font-size:14px;line-height:1.7;color:#4c4337;font-weight:700}
.wrap{padding:18px 16px 20px}
.flow-title{font-family:"Noto Serif KR",serif;font-size:16px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gold-soft);padding-bottom:9px;margin-bottom:16px;display:flex;align-items:center;gap:8px;line-height:1.2}.flow-icon{width:22px;height:22px;object-fit:contain;display:block}
.card{background:var(--card);border:1px solid var(--line-soft);border-radius:12px;overflow:hidden;margin-bottom:14px;opacity:0;transform:translateY(12px);transition:.3s}.card.in{opacity:1;transform:none}
.head{display:flex;gap:12px;align-items:center;padding:14px 15px 12px;border-bottom:1px solid #f0ece6;background:#fff}
.num{width:34px;height:34px;border-radius:999px;background:var(--navy);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.title{font-size:16px;font-weight:800;color:var(--navy);line-height:1.45;letter-spacing:-.01em}.sub{margin-top:3px;font-size:12px;color:var(--muted);line-height:1.6}
.shot-area{background:linear-gradient(180deg,#161b25,#0f141d);padding:18px 0 20px;text-align:center}
.phone{position:relative;display:inline-block;padding:12px;border-radius:24px;background:linear-gradient(180deg,#0f141f,#070b12);box-shadow:0 14px 34px rgba(0,0,0,.26), inset 0 0 0 1px rgba(255,255,255,.06)}
.screen{position:relative;z-index:2;border-radius:16px;overflow:hidden;background:#000;--ct:0%;--cr:0%;--cb:0%;--cl:0%}
.screen img{display:block;max-width:100%;width:auto;height:auto;max-height:440px;border-radius:16px;transform:translateZ(0)}
.screen img.full{width:100%;max-width:760px;height:auto;max-height:none;object-fit:contain;object-position:top}
.img-blur{filter:brightness(.66) saturate(.92);transform:translateZ(0)}
.img-sharp{position:absolute;inset:0;width:100%;height:100%;filter:none;object-fit:inherit;object-position:inherit;clip-path: inset(var(--ct) var(--cr) var(--cb) var(--cl) round var(--r))}
.ring{position:absolute;z-index:6;pointer-events:none;border-radius:var(--r);border:1.5px solid rgba(210,181,127,.98);box-shadow:0 0 0 1px rgba(255,255,255,.1) inset}
.callout{position:absolute;z-index:7;pointer-events:none;display:flex;align-items:center;justify-content:center}
.bub{background:rgba(18,23,34,.92);color:#fff;font-size:12px;font-weight:800;line-height:1;padding:8px 12px;border-radius:999px;white-space:nowrap;border:1px solid rgba(210,181,127,.35);letter-spacing:-.01em}
.arrow{margin:0 0 12px;text-align:center;font-size:14px;color:#8a7a63;letter-spacing:.08em}
.tip{padding:12px 14px;background:#fbfaf7;border-top:1px solid #ece7e0}.tip .lbl{font-size:11px;font-weight:800;color:#6c5840;margin-bottom:4px;letter-spacing:.04em}.tip p{font-size:13px;line-height:1.75;color:#4d5562}.tip strong{color:#2d3440}
.complete{background:#fff;border:1px solid var(--line-soft);border-radius:12px;padding:22px 18px;text-align:center;margin:8px 0 16px}.complete .t{font-family:"Noto Serif KR",serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}.complete .d{font-size:14px;color:#616a77;line-height:1.7}
.help{background:var(--navy);margin:6px 16px 24px;border-radius:12px;padding:20px 18px;text-align:center}.help h3{font-family:"Noto Serif KR",serif;font-size:18px;color:#fff;margin-bottom:6px}.help p{font-size:14px;color:#c8c2ba;margin-bottom:14px;line-height:1.7}.help a{display:inline-flex;align-items:center;justify-content:center;background:#fff;color:var(--navy);text-decoration:none;font-size:18px;font-weight:800;padding:11px 24px;border-radius:999px;border:1px solid rgba(255,255,255,.12)}
.footer{border-top:1px solid rgba(222,215,205,.8);text-align:center;padding:14px;font-size:11px;color:#8d95a1}`;
}

/* =========================================================
   12. 배포용 JS 생성
   ========================================================= */
function getDeployJs(){
  return `const FLOWS = ${JSON.stringify(FLOWS, null, 2)};
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>Array.from(p.querySelectorAll(s));
const landing=$('#landing');
const manual=$('#manual');
const flowTitle=$('#flowTitle');
const flowRoot=$('#flowRoot');
let io=null;
const esc=(s)=>(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
function setAppHeight(){ const vh=window.innerHeight*0.01; document.documentElement.style.setProperty('--appH', (vh*100) + 'px'); }
function setTab(key){ $$('.tab').forEach(btn=>btn.classList.toggle('on', btn.dataset.tab===key)); }
function arrowEl(){ const el=document.createElement('div'); el.className='arrow'; el.textContent='—'; return el; }
function completeEl(data){ const el=document.createElement('div'); el.className='complete'; el.innerHTML=\`<div class="t">\${esc(data.title)}</div><div class="d">\${esc(data.desc)}</div>\`; return el; }
function stepCard(stepNumber, step){ const el=document.createElement('div'); el.className='card'; el.innerHTML=\`
<div class="head">
  <div class="num">\${stepNumber}</div>
  <div>
    <div class="title">\${step.t}</div>
    \${step.sub ? \`<div class="sub">\${step.sub}</div>\` : ''}
  </div>
</div>
<div class="shot-area">
  <div class="phone">
    <div class="screen">
      <img class="img-blur \${step.full ? 'full' : ''}" src="\${step.img}" alt="\${esc(step.alt)}">
      <img class="img-sharp \${step.full ? 'full' : ''}" src="\${step.img}" alt="">
      <span data-hl data-top="\${step.hl.top}" \${step.hl.left!=null ? \`data-left="\${step.hl.left}"\` : ''} \${step.hl.right!=null ? \`data-right="\${step.hl.right}"\` : ''} data-w="\${step.hl.w}" data-h="\${step.hl.h}" data-label="\${esc(step.hl.label || '')}" \${step.hl.pos ? \`data-pos="\${step.hl.pos}"\` : ''}></span>
    </div>
  </div>
</div>\`;
if(step.tip){ const tip=document.createElement('div'); tip.className='tip'; tip.innerHTML=\`<div class="lbl">\${step.tip.lbl}</div><p>\${step.tip.html}</p>\`; el.appendChild(tip); }
return el; }
function animateCards(){ if(io) io.disconnect(); io=new IntersectionObserver(entries=>{ entries.forEach(entry=>{ if(entry.isIntersecting) entry.target.classList.add('in'); }); },{threshold:.07}); $$('.card').forEach(card=>{ card.classList.remove('in'); io.observe(card); }); }
function buildSpot(){ $$('.screen').forEach(screen=>{ $$('.ring,.callout', screen).forEach(el=>el.remove()); const hl=$('[data-hl]', screen); if(!hl) return; const top=+hl.dataset.top; const w=+hl.dataset.w; const h=+hl.dataset.h; const left0=hl.dataset.left!=null ? +hl.dataset.left : null; const right0=hl.dataset.right!=null ? +hl.dataset.right : null; const label=hl.dataset.label || ''; const pos=hl.dataset.pos || 'below'; const left=(right0 != null) ? (100 - right0 - w) : left0; const ct=top; const cl=left; const cb=100 - (top + h); const cr=100 - (left + w); screen.style.setProperty('--ct', ct + '%'); screen.style.setProperty('--cr', cr + '%'); screen.style.setProperty('--cb', cb + '%'); screen.style.setProperty('--cl', cl + '%'); const ring=document.createElement('div'); ring.className='ring'; ring.style.cssText=\`top:\${top}%;left:\${left}%;width:\${w}%;height:\${h}%;\`; screen.appendChild(ring); const callout=document.createElement('div'); callout.className='callout'; const cTop=(pos === 'above') ? (top - 8) : (top + h + 3); let mid=left + (w / 2); mid=Math.min(Math.max(mid, 12), 88); callout.style.cssText=\`top:\${cTop}%;left:\${mid}%;transform:translateX(-50%);\`; callout.innerHTML=\`<div class="bub">\${esc(label)}</div>\`; screen.appendChild(callout); }); }
async function waitImgs(root){ const imgs=$$('img', root); await Promise.all(imgs.map(img=>img.complete ? 0 : new Promise(resolve=>{ img.addEventListener('load', resolve, { once:true }); img.addEventListener('error', resolve, { once:true }); }))); }
async function render(key){ const data=FLOWS[key]; setTab(key); flowTitle.innerHTML=data.title; flowRoot.innerHTML=''; data.steps.forEach((step, index)=>{ flowRoot.appendChild(stepCard(index + 1, step)); if(index < data.steps.length - 1) flowRoot.appendChild(arrowEl()); }); if(data.complete) flowRoot.appendChild(completeEl(data.complete)); window.scrollTo(0,0); animateCards(); await waitImgs(flowRoot); buildSpot(); }
function openManual(key){ landing.style.display='none'; manual.style.display='block'; render(key); }
function backToLanding(){ manual.style.display='none'; landing.style.display='flex'; window.scrollTo(0,0); }
function bindAppEvents(){ $$('.choice-btn').forEach(btn=>btn.addEventListener('click',()=>openManual(btn.dataset.go))); const backBtn=$('#back'); if(backBtn) backBtn.addEventListener('click', backToLanding); $$('.tab').forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.tab))); window.addEventListener('resize',()=>{ setAppHeight(); manual.style.display === 'block' && buildSpot(); }); }
setAppHeight(); bindAppEvents();`;
}

function getDeployHtml(){
  return `<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3" />
<title>비밀번호 찾기 안내 | 모나용평</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
${getBodyMarkupForDeploy()}
<script src="js/app.js"><\/script>
</body>
</html>`;
}

/* =========================================================
   13. 배포용 이미지 목록 수집
   ========================================================= */
function collectImagePathsFromFlows(flows){
  const set = new Set();

  Object.values(flows).forEach(flow => {
    flow.steps.forEach(step => {
      if(step.img) set.add(step.img);
    });

    if(typeof flow.title === 'string'){
      const match = flow.title.match(/src="([^"]+)"/);
      if(match) set.add(match[1]);
    }
  });

  set.add('images/logo/mona_app.jpg');

  return [...set];
}

async function fetchAsBlob(path){
  const res = await fetch(path);
  if(!res.ok) throw new Error(`이미지 로드 실패: ${path}`);
  return await res.blob();
}

/* =========================================================
   14. 배포 ZIP 생성
   ========================================================= */
async function downloadDeployZip(){
  const btn = $('#deployDownloadBtn');
  const originalText = btn.textContent;
  btn.textContent = '배포 압축 중...';
  btn.disabled = true;

  try{
    const zip = new JSZip();

    zip.file('index.html', getDeployHtml());
    zip.folder('css').file('style.css', getDeployCss());
    zip.folder('js').file('app.js', getDeployJs());

    const imagePaths = collectImagePathsFromFlows(FLOWS);
    const imagesFolder = zip.folder('images');

    for(const path of imagePaths){
      const blob = await fetchAsBlob(path);
      const relative = path.replace(/^images\//, '');

      if(path.startsWith('images/')){
        imagesFolder.file(relative, blob);
      }else{
        zip.file(path, blob);
      }
    }

    const content = await zip.generateAsync({ type:'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = '배포용 다운로드.zip';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    btn.textContent = '배포 완료';
    setTimeout(() => btn.textContent = originalText, 1200);
  }catch(err){
    console.error(err);
    alert('배포 ZIP 생성 중 오류가 발생했습니다.\n로컬 서버 환경에서 실행 중인지 확인하세요.\n\n' + err.message);
    btn.textContent = originalText;
  }finally{
    btn.disabled = false;
  }
}

/* =========================================================
   15. 초기화 / 이벤트 바인딩
   ========================================================= */
function bindAppEvents(){
  $$('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => openManual(btn.dataset.go));
  });

  const backBtn = $('#back');
  if(backBtn) backBtn.addEventListener('click', backToLanding);

  $$('.tab').forEach(btn => {
    btn.addEventListener('click', () => render(btn.dataset.tab));
  });

  window.addEventListener('resize', () => {
    setAppHeight();
    if(manual.style.display === 'block') buildSpot();
  });
}

function initDevApp(){
  setAppHeight();
  bindAppEvents();

  /* HL 선택: Alt + 클릭 */
  document.addEventListener('click', (e) => {
    if(!HL_EDIT || !e.altKey) return;
    const t = selectTargetFromEvent(e);
    if(!t) return;
    hlTarget = t;
    refreshOne(hlTarget.screenEl);
    e.preventDefault();
    e.stopPropagation();
  }, true);

  /* HL 드래그 시작: Shift + 마우스다운 */
  document.addEventListener('mousedown', (e) => {
    if(!HL_EDIT || !e.shiftKey) return;
    const t = selectTargetFromEvent(e);
    if(!t) return;

    hlTarget = t;
    dragging = true;
    dragStart = { x:e.clientX, y:e.clientY };

    const rect = percentRectFromDrag(hlTarget.screenEl, dragStart, { x:e.clientX + 1, y:e.clientY + 1 });
    applyHlToStep(hlTarget.st, rect);
    refreshOne(hlTarget.screenEl);

    e.preventDefault();
    e.stopPropagation();
  }, true);

  document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY), true);
  document.addEventListener('mouseup', endDrag, true);

  /* 모바일 터치 드래그 지원 */
  document.addEventListener('touchstart', (e) => {
    if(!HL_EDIT) return;
    const t = selectTargetFromEvent(e);
    if(!t) return;
    hlTarget = t;
    dragging = true;
    const touch = e.touches[0];
    dragStart = { x:touch.clientX, y:touch.clientY };
    e.preventDefault();
  }, { passive:false });

  document.addEventListener('touchmove', (e) => {
    if(!dragging || !hlTarget) return;
    const touch = e.touches[0];
    moveDrag(touch.clientX, touch.clientY);
    e.preventDefault();
  }, { passive:false });

  document.addEventListener('touchend', (e) => {
    endDrag();
    e.preventDefault();
  }, { passive:false });

  /* HL 편집 토글 */
  $('#hlToggle').addEventListener('click', () => {
    HL_EDIT = !HL_EDIT;
    $('#hlToggle').classList.toggle('on', HL_EDIT);

    if(!HL_EDIT){
      $$('.hl-rect').forEach(el => el.remove());
    }else if(hlTarget){
      refreshOne(hlTarget.screenEl);
    }
  });

  /* 현재 선택 좌표 복사 */
  $('#hlCopy').addEventListener('click', async () => {
    if(!hlTarget){
      alert('Alt+클릭으로 편집할 단계를 먼저 선택하세요.');
      return;
    }

    const hl = hlTarget.st.hl;
    const obj = {
      top:+hl.top,
      ...(hl.left != null ? { left:+hl.left } : { right:+hl.right }),
      w:+hl.w,
      h:+hl.h
    };
    const txt = JSON.stringify(obj);

    try{
      await navigator.clipboard.writeText(txt);
      $('#hlCopy').textContent = '복사됨';
      setTimeout(() => $('#hlCopy').textContent = '좌표 복사', 900);
    }catch(err){
      console.log(txt);
      alert('클립보드 권한이 없어 콘솔에 출력했습니다.');
    }
  });

  /* 배포 ZIP 다운로드 버튼 */
  $('#deployDownloadBtn').addEventListener('click', downloadDeployZip);
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initDevApp);
}else{
  initDevApp();
}
</script>
</body>
